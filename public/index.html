<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TermTunnel">
  <meta name="theme-color" content="#0a0e14">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon.png">
  <title>TermTunnel</title>

  <!-- JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <!-- xterm.js -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>

  <link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="app">
  <!-- Header -->
  <div id="status-bar">
    <div id="status-dot"></div>
    <button id="scroll-btn" class="d-none" title="Toggle scroll mode">SCR</button>
    <button id="settings-btn" title="Settings">⚙</button>
  </div>
  <div id="reconnect-toast"></div>

  <!-- Terminal + Overlay -->
  <div id="terminal-wrap">
    <div id="terminal"></div>

    <div id="connect-overlay">
      <div class="connect-card">
        <h2>TERMTUNNEL</h2>
        <p id="connect-subtitle">Connecting to server…</p>

        <div class="field" id="field-session">
          <label>Session</label>
          <select id="inp-session"></select>
          <input type="text" id="inp-session-new" class="d-none" placeholder="new session name" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" style="margin-top:8px">
        </div>

        <button id="connect-btn" disabled>CONNECT</button>
        <div id="connect-error"></div>
      </div>
    </div>
  </div>

  <!-- Custom Keyboard -->
  <div id="kb-keyboard">

    <!-- Page 1: QWERTY -->
    <div id="kb-page-qwerty" class="kb-page active">
      <div class="kb-row">
        <button class="kb-key" data-char="q">q</button>
        <button class="kb-key" data-char="w">w</button>
        <button class="kb-key" data-char="e">e</button>
        <button class="kb-key" data-char="r">r</button>
        <button class="kb-key" data-char="t">t</button>
        <button class="kb-key" data-char="y">y</button>
        <button class="kb-key" data-char="u">u</button>
        <button class="kb-key" data-char="i">i</button>
        <button class="kb-key" data-char="o">o</button>
        <button class="kb-key" data-char="p">p</button>
      </div>
      <div class="kb-row">
        <button class="kb-key" data-char="a">a</button>
        <button class="kb-key" data-char="s">s</button>
        <button class="kb-key" data-char="d">d</button>
        <button class="kb-key" data-char="f">f</button>
        <button class="kb-key" data-char="g">g</button>
        <button class="kb-key" data-char="h">h</button>
        <button class="kb-key" data-char="j">j</button>
        <button class="kb-key" data-char="k">k</button>
        <button class="kb-key" data-char="l">l</button>
      </div>
      <div class="kb-row">
        <button class="kb-key kb-mod kb-key-shift" id="kb-shift">⇧</button>
        <button class="kb-key" data-char="z">z</button>
        <button class="kb-key" data-char="x">x</button>
        <button class="kb-key" data-char="c">c</button>
        <button class="kb-key" data-char="v">v</button>
        <button class="kb-key" data-char="b">b</button>
        <button class="kb-key" data-char="n">n</button>
        <button class="kb-key" data-char="m">m</button>
        <button class="kb-key kb-key-wide kb-key-del" data-send="&#x7f;" data-repeat>⌫</button>
      </div>
      <div class="kb-row">
        <button class="kb-key kb-key-mode" id="kb-123-btn">123</button>
        <button class="kb-key kb-mod kb-key-ctrl" id="kb-ctrl">Ctrl</button>
        <button class="kb-key kb-key-space" data-send=" "> </button>
        <button class="kb-key kb-key-wide kb-key-return" data-send="&#x0d;">↵</button>
      </div>
    </div>

    <!-- Page 2: Numbers / Common Symbols -->
    <div id="kb-page-num" class="kb-page">
      <div class="kb-row">
        <button class="kb-key" data-send="1">1</button>
        <button class="kb-key" data-send="2">2</button>
        <button class="kb-key" data-send="3">3</button>
        <button class="kb-key" data-send="4">4</button>
        <button class="kb-key" data-send="5">5</button>
        <button class="kb-key" data-send="6">6</button>
        <button class="kb-key" data-send="7">7</button>
        <button class="kb-key" data-send="8">8</button>
        <button class="kb-key" data-send="9">9</button>
        <button class="kb-key" data-send="0">0</button>
      </div>
      <div class="kb-row">
        <button class="kb-key" data-send="-">-</button>
        <button class="kb-key" data-send="/">/</button>
        <button class="kb-key" data-send=":">:</button>
        <button class="kb-key" data-send=";">;</button>
        <button class="kb-key" data-send="(">(</button>
        <button class="kb-key" data-send=")">)</button>
        <button class="kb-key" data-send="$">$</button>
        <button class="kb-key" data-send="&amp;">&amp;</button>
        <button class="kb-key" data-send="@">@</button>
        <button class="kb-key" data-send="&quot;">"</button>
      </div>
      <!-- shift-style row: #+= nav key on left, delete on right -->
      <div class="kb-row">
        <button class="kb-key kb-key-sym-nav" id="kb-sym-btn">#+= </button>
        <button class="kb-key" data-send=".">.</button>
        <button class="kb-key" data-send=",">,</button>
        <button class="kb-key" data-send="?">?</button>
        <button class="kb-key" data-send="!">!</button>
        <button class="kb-key" data-send="'">'</button>
        <button class="kb-key kb-key-sym-nav kb-key-del" data-send="&#x7f;" data-repeat>⌫</button>
      </div>
      <div class="kb-row">
        <button class="kb-key kb-key-mode" id="kb-abc-btn">ABC</button>
        <button class="kb-key kb-mod kb-key-ctrl" id="kb-ctrl-num">Ctrl</button>
        <button class="kb-key kb-key-space" data-send=" "> </button>
        <button class="kb-key kb-key-wide kb-key-return" data-send="&#x0d;">↵</button>
      </div>
    </div>

    <!-- Page 3: Extended Symbols (#+= page) -->
    <div id="kb-page-sym" class="kb-page">
      <div class="kb-row">
        <button class="kb-key" data-send="[">[</button>
        <button class="kb-key" data-send="]">]</button>
        <button class="kb-key" data-send="{">{</button>
        <button class="kb-key" data-send="}">}</button>
        <button class="kb-key" data-send="#">#</button>
        <button class="kb-key" data-send="%">%</button>
        <button class="kb-key" data-send="^">^</button>
        <button class="kb-key" data-send="*">*</button>
        <button class="kb-key" data-send="+">+</button>
        <button class="kb-key" data-send="=">=</button>
      </div>
      <div class="kb-row">
        <button class="kb-key" data-send="_">_</button>
        <button class="kb-key" data-send="\">\</button>
        <button class="kb-key" data-send="|">|</button>
        <button class="kb-key" data-send="~">~</button>
        <button class="kb-key" data-send="`">`</button>
        <button class="kb-key" data-send="<">&lt;</button>
        <button class="kb-key" data-send=">">&gt;</button>
        <button class="kb-key" data-send="&amp;">&amp;</button>
        <button class="kb-key" data-send="'">'</button>
        <button class="kb-key" data-send="&quot;">"</button>
      </div>
      <!-- shift-style row: 123 nav key on left, delete on right -->
      <div class="kb-row">
        <button class="kb-key kb-key-sym-nav" id="kb-123-from-sym-btn">123</button>
        <button class="kb-key" data-send=".">.</button>
        <button class="kb-key" data-send=",">,</button>
        <button class="kb-key" data-send="?">?</button>
        <button class="kb-key" data-send="!">!</button>
        <button class="kb-key" data-send="-">-</button>
        <button class="kb-key kb-key-sym-nav kb-key-del" data-send="&#x7f;" data-repeat>⌫</button>
      </div>
      <div class="kb-row">
        <button class="kb-key kb-key-mode" id="kb-abc-from-sym-btn">ABC</button>
        <button class="kb-key kb-mod kb-key-ctrl" id="kb-ctrl-sym">Ctrl</button>
        <button class="kb-key kb-key-space" data-send=" "> </button>
        <button class="kb-key kb-key-wide kb-key-return" data-send="&#x0d;">↵</button>
      </div>
    </div>

  </div>

</div>

<!-- Toolbar Long-Press Popup -->
<div id="tb-popup"></div>

<!-- Scroll Pill -->
<div id="scroll-pill"></div>
<div id="scroll-bottom-btn">↓</div>

<!-- Settings Backdrop + Panel -->
<div id="settings-backdrop"></div>
<div id="settings-panel">
  <div class="settings-header">
    <h3>SETTINGS</h3>
    <button id="settings-close-btn" aria-label="Close settings">✕</button>
  </div>
  <div class="setting-actions">
    <button class="sa-btn" id="reconnect-btn">Reconnect</button>
    <button class="sa-btn" id="switch-btn">Switch Session</button>
  </div>
  <div class="setting-row">
    <div class="setting-label">Font Size<small>px</small></div>
    <input type="number" id="set-fontsize" value="14" min="8" max="32">
  </div>
  <div class="setting-row">
    <div class="setting-label">Keyboard Font Size<small>px</small></div>
    <input type="number" id="set-kb-fontsize" value="22" min="8" max="40">
  </div>
  <div class="setting-row">
    <div class="setting-label">Scrollback<small>lines</small></div>
    <input type="number" id="set-scrollback" value="2000" min="100" max="10000">
  </div>
  <div class="setting-row">
    <div class="setting-label">Cursor Style</div>
    <div class="seg-ctrl" id="set-cursor">
      <button class="seg-btn" data-value="block">Block</button>
      <button class="seg-btn" data-value="underline">Underline</button>
      <button class="seg-btn" data-value="bar">Bar</button>
    </div>
  </div>
  <div class="setting-row">
    <div class="setting-label">Auto-Reconnect<small>on disconnect</small></div>
    <label class="toggle">
      <input type="checkbox" id="set-reconnect" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>
  <div class="setting-row" id="version-row">
    <div class="setting-label">Version<small id="version-hash">—</small></div>
    <button class="sa-btn" id="check-update-btn">Check</button>
  </div>
  <div id="update-status"></div>
</div>

<!-- Keyboard Toolbar -->
<div id="kb-toolbar">
  <button class="tb-key tb-esc" id="tb-esc" data-send="&#x1b;" data-lp>Esc</button>
  <button class="tb-key" id="tb-tab" data-send="&#x09;">Tab</button>
  <button class="tb-key tb-arrow tb-arrow-h" data-send="&#x1b;[D"><span>↓</span></button>
  <button class="tb-key tb-arrow" data-send="&#x1b;[A">↑</button>
  <button class="tb-key tb-arrow" data-send="&#x1b;[B">↓</button>
  <button class="tb-key tb-arrow tb-arrow-h" data-send="&#x1b;[C"><span>↑</span></button>
</div>

<script type="module" src="/app.js"></script>
</body>
</html>
